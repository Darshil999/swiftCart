spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/swiftcart_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update          # Use 'validate' in production with Flyway/Liquibase
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    default-property-inclusion: non_null

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

# JWT configuration
# IMPORTANT: Replace the secret with a 256-bit+ Base64-encoded secret in production.
# Use environment variables or a secrets manager — never hardcode in production.
application:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration-ms: 86400000  # 24 hours
  cart:
    # Sliding TTL: refreshed on add / remove line (not on GET).
    ttl: 24h
  stripe:
    # Test keys from Stripe Dashboard (https://dashboard.stripe.com/test/apikeys)
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    success-url: "http://localhost:3000/checkout/success?session_id={CHECKOUT_SESSION_ID}"
    cancel-url: "http://localhost:3000/checkout/cancel"
    currency: usd
